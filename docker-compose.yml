services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/dev.db
      - JWT_SECRET=losev-psi-jwt-secret-change-me-in-production-2024
    volumes:
      # SQLite veritabanını container yeniden başlatılsa da koru
      - sqlite_data:/app/data
    restart: always

volumes:
  sqlite_data:
